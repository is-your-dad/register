name: Raw API

on:
    push:
        branches: [main]
        paths:
            - "domains/*"
            - ".github/workflows/raw-api.yml"
            - "util/raw-api.js"
            - "util/reserved.json"
            - "util/internal.json"

    workflow_dispatch:

concurrency:
    group: ${{ github.ref }}-raw-api
    cancel-in-progress: true

jobs:
    update:
        name: Update
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 20.x

            - name: Build v2.json
              run: node util/raw-api.js

            - name: Create CNAME
              run: echo "raw.is-your.dad" > raw-api/CNAME

            - name: Push to is-your-dad/raw-api
              uses: cpina/github-action-push-to-another-repository@main
              with:
                  source-directory: "raw-api"
                  destination-github-username: is-your-dad
                  destination-repository-name: raw-api
                  user-email: "actions@github.com"
                  user-name: "GitHub Actions"
                  target-branch: main
              env:
                  SSH_DEPLOY_KEY: ${{ secrets.RAW_API_DEPLOY_KEY }}
